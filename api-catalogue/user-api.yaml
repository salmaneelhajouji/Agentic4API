id: user-api
name: User API
description: API de gestion des utilisateurs et profils clients. Inscription, authentification et mise à jour des données personnelles.
team: Equipe Identity
version: v2
endpoints:
  - POST /v2/users/register
  - POST /v2/users/login
  - GET /v2/users/{id}
  - PUT /v2/users/{id}
  - DELETE /v2/users/{id}