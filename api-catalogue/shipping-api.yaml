id: shipping-api
name: Shipping API
description: API de gestion des expéditions et livraisons. Calcul des frais de port, suivi colis et gestion des retours.
team: Equipe Logistique
version: v1
endpoints:
  - POST /v1/shipping/estimate
  - POST /v1/shipping/create
  - GET /v1/shipping/{trackingId}
  - PUT /v1/shipping/{trackingId}/cancel
  - POST /v1/shipping/return