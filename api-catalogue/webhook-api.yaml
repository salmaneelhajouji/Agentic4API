id: webhook-api
name: Webhook API
description: API de gestion des webhooks. Enregistrement, validation et diffusion d'événements vers des endpoints externes.
team: Equipe Platform
version: v1
endpoints:
  - POST /v1/webhooks
  - GET /v1/webhooks/{id}
  - PUT /v1/webhooks/{id}
  - DELETE /v1/webhooks/{id}
  - POST /v1/webhooks/{id}/test